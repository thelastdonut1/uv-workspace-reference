[project]
name = "api"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "core",
    "fastapi[standard]>=0.139.0",
    "python-dotenv>=1.2.2",
    "summarizer",
    "uvicorn>=0.51.0",
]

[project.scripts]
api = "api.main:main"

[tool.uv.sources]
core = { workspace = true }
summarizer = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
